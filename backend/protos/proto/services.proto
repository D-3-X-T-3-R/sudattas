// service.proto

syntax = "proto3";

package grpc_services;

import "proto/messages.proto";

service GRPCServices {

    // ShippingAddress
    rpc CreateShippingAddress(CreateShippingAddressRequest) returns (ShippingAddressesResponse);
    rpc UpdateShippingAddress(UpdateShippingAddressRequest) returns (ShippingAddressesResponse);
    rpc DeleteShippingAddress(DeleteShippingAddressRequest) returns (ShippingAddressesResponse);
    rpc GetShippingAddress(GetShippingAddressRequest) returns (ShippingAddressesResponse);

    // Cart
    rpc CreateCartItem(CreateCartItemRequest) returns (CartItemsResponse);
    rpc GetCartItems(GetCartItemsRequest) returns (CartItemsResponse);
    rpc UpdateCartItem(UpdateCartItemRequest) returns (CartItemsResponse);
    rpc DeleteCartItem(DeleteCartItemRequest) returns (CartItemsResponse);
    rpc EnqueueAbandonedCart(EnqueueAbandonedCartRequest) returns (EnqueueAbandonedCartResponse);

    // Product
    rpc CreateProduct(CreateProductRequest) returns (ProductsResponse);
    rpc SearchProduct(SearchProductRequest) returns (ProductsResponse);
    rpc UpdateProduct(UpdateProductRequest) returns (ProductsResponse);
    rpc DeleteProduct(DeleteProductRequest) returns (ProductsResponse);
    rpc GetProductsById(GetProductsByIdRequest) returns (ProductsResponse);
    rpc GetRelatedProducts(GetRelatedProductsRequest) returns (ProductsResponse);
    rpc GetSitemapProductUrls(GetSitemapProductUrlsRequest) returns (GetSitemapProductUrlsResponse);

    // Users
    rpc CreateUser(CreateUserRequest) returns (UsersResponse);
    rpc SearchUser(SearchUserRequest) returns (UsersResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UsersResponse);
    rpc DeleteUser(DeleteUserRequest) returns (UsersResponse);
    rpc GetUserPiiExport(GetUserPiiExportRequest) returns (GetUserPiiExportResponse);
    rpc RecordSecurityAuditEvent(RecordSecurityAuditRequest) returns (RecordSecurityAuditResponse);

    // Categories
    rpc CreateCategory(CreateCategoryRequest) returns (CategoriesResponse);
    rpc SearchCategory(SearchCategoryRequest) returns (CategoriesResponse);
    rpc UpdateCategory(UpdateCategoryRequest) returns (CategoriesResponse);
    rpc DeleteCategory(DeleteCategoryRequest) returns (CategoriesResponse);

    // Orders
    rpc CreateOrder(CreateOrderRequest) returns (OrdersResponse);
    rpc SearchOrder(SearchOrderRequest) returns (OrdersResponse);
    rpc UpdateOrder(UpdateOrderRequest) returns (OrdersResponse);
    rpc DeleteOrder(DeleteOrderRequest) returns (OrdersResponse);
    rpc PlaceOrder(PlaceOrderRequest) returns (OrdersResponse);
    rpc AdminMarkOrderShipped(AdminMarkOrderShippedRequest) returns (AdminMarkOrderShippedResponse);
    rpc AdminMarkOrderDelivered(AdminMarkOrderDeliveredRequest) returns (AdminMarkOrderDeliveredResponse);

    // OrderDetails
    rpc CreateOrderDetails(CreateOrderDetailsRequest) returns (OrderDetailsResponse);
    rpc SearchOrderDetail(SearchOrderDetailRequest) returns (OrderDetailsResponse);
    rpc UpdateOrderDetail(UpdateOrderDetailRequest) returns (OrderDetailsResponse);

    // Reviews
    rpc CreateReview(CreateReviewRequest) returns (ReviewsResponse);
    rpc SearchReview(SearchReviewRequest) returns (ReviewsResponse);
    rpc UpdateReview(UpdateReviewRequest) returns (ReviewsResponse);
    rpc DeleteReview(DeleteReviewRequest) returns (ReviewsResponse);
    rpc AdminUpdateReviewStatus(AdminUpdateReviewStatusRequest) returns (AdminUpdateReviewStatusResponse);

    // ProductImages
    // AddProductImage removed — use GetPresignedUploadUrl + ConfirmImageUpload instead
    rpc SearchProductImage(SearchProductImageRequest) returns (ProductImagesResponse);
    rpc UpdateProductImage(UpdateProductImageRequest) returns (ProductImagesResponse);
    rpc DeleteProductImage(DeleteProductImageRequest) returns (ProductImagesResponse);

    // Inventory
    rpc CreateInventoryItem(CreateInventoryItemRequest) returns (InventoryItemsResponse);
    rpc SearchInventoryItem(SearchInventoryItemRequest) returns (InventoryItemsResponse);
    rpc UpdateInventoryItem(UpdateInventoryItemRequest) returns (InventoryItemsResponse);
    rpc DeleteInventoryItem(DeleteInventoryItemRequest) returns (InventoryItemsResponse);

    // Wishlist
    rpc AddWishlistItem(AddWishlistItemRequest) returns (WishlistItemsResponse);
    rpc SearchWishlistItem(SearchWishlistItemRequest) returns (WishlistItemsResponse);
    rpc DeleteWishlistItem(DeleteWishlistItemRequest) returns (WishlistItemsResponse);

    // ProductAttributes
    rpc CreateProductAttribute(CreateProductAttributeRequest) returns (ProductAttributesResponse);
    rpc SearchProductAttribute(SearchProductAttributeRequest) returns (ProductAttributesResponse);
    rpc UpdateProductAttribute(UpdateProductAttributeRequest) returns (ProductAttributesResponse);
    rpc DeleteProductAttribute(DeleteProductAttributeRequest) returns (ProductAttributesResponse);

    // ShippingMethods
    rpc CreateShippingMethod(CreateShippingMethodRequest) returns (ShippingMethodsResponse);
    rpc SearchShippingMethod(SearchShippingMethodRequest) returns (ShippingMethodsResponse);
    rpc UpdateShippingMethod(UpdateShippingMethodRequest) returns (ShippingMethodsResponse);
    rpc DeleteShippingMethod(DeleteShippingMethodRequest) returns (ShippingMethodsResponse);

    // UserRole
    rpc CreateUserRole(CreateUserRoleRequest) returns (UserRolesResponse);
    rpc SearchUserRole(SearchUserRoleRequest) returns (UserRolesResponse);
    rpc UpdateUserRole(UpdateUserRoleRequest) returns (UserRolesResponse);
    rpc DeleteUserRole(DeleteUserRoleRequest) returns (UserRolesResponse);

    // Transactions
    rpc CreateTransaction(CreateTransactionRequest) returns (TransactionsResponse);
    rpc SearchTransaction(SearchTransactionRequest) returns (TransactionsResponse);
    rpc UpdateTransaction(UpdateTransactionRequest) returns (TransactionsResponse);
    rpc DeleteTransaction(DeleteTransactionRequest) returns (TransactionsResponse);

    // NewsletterSubscribers
    rpc CreateNewsletterSubscriber(CreateNewsletterSubscriberRequest) returns (NewsletterSubscribersResponse);
    rpc SearchNewsletterSubscriber(SearchNewsletterSubscriberRequest) returns (NewsletterSubscribersResponse);
    rpc UpdateNewsletterSubscriber(UpdateNewsletterSubscriberRequest) returns (NewsletterSubscribersResponse);
    rpc DeleteNewsletterSubscriber(DeleteNewsletterSubscriberRequest) returns (NewsletterSubscribersResponse);

    // Sizes
    rpc CreateSize(CreateSizeRequest) returns (SizesResponse);
    rpc SearchSize(SearchSizeRequest) returns (SizesResponse);
    rpc UpdateSize(UpdateSizeRequest) returns (SizesResponse);
    rpc DeleteSize(DeleteSizeRequest) returns (SizesResponse);

    // Colors
    rpc CreateColor(CreateColorRequest) returns (ColorsResponse);
    rpc SearchColor(SearchColorRequest) returns (ColorsResponse);
    rpc UpdateColor(UpdateColorRequest) returns (ColorsResponse);
    rpc DeleteColor(DeleteColorRequest) returns (ColorsResponse);

    // ProductAttributeMapping
    rpc CreateProductAttributeMapping(CreateProductAttributeMappingRequest) returns (ProductAttributeMappingsResponse);
    rpc SearchProductAttributeMapping(SearchProductAttributeMappingRequest) returns (ProductAttributeMappingsResponse);
    rpc DeleteProductAttributeMapping(DeleteProductAttributeMappingRequest) returns (ProductAttributeMappingsResponse);

    // ProductVariants
    rpc CreateProductVariant(CreateProductVariantRequest) returns (ProductVariantsResponse);
    rpc SearchProductVariant(SearchProductVariantRequest) returns (ProductVariantsResponse);
    rpc UpdateProductVariant(UpdateProductVariantRequest) returns (ProductVariantsResponse);
    rpc DeleteProductVariant(DeleteProductVariantRequest) returns (ProductVariantsResponse);

    // EventLogs
    rpc CreateEventLog(CreateEventLogRequest) returns (EventLogsResponse);
    rpc SearchEventLog(SearchEventLogRequest) returns (EventLogsResponse);
    rpc UpdateEventLog(UpdateEventLogRequest) returns (EventLogsResponse);
    rpc DeleteEventLog(DeleteEventLogRequest) returns (EventLogsResponse);

    // UserActivity
    rpc CreateUserActivity(CreateUserActivityRequest) returns (UserActivitiesResponse);
    rpc SearchUserActivity(SearchUserActivityRequest) returns (UserActivitiesResponse);
    rpc UpdateUserActivity(UpdateUserActivityRequest) returns (UserActivitiesResponse);
    rpc DeleteUserActivity(DeleteUserActivityRequest) returns (UserActivitiesResponse);

    // InventoryLog
    rpc CreateInventoryLog(CreateInventoryLogRequest) returns (InventoryLogsResponse);
    rpc SearchInventoryLog(SearchInventoryLogRequest) returns (InventoryLogsResponse);
    rpc UpdateInventoryLog(UpdateInventoryLogRequest) returns (InventoryLogsResponse);
    rpc DeleteInventoryLog(DeleteInventoryLogRequest) returns (InventoryLogsResponse);

    // PaymentIntents
    rpc CreatePaymentIntent(CreatePaymentIntentRequest) returns (PaymentIntentsResponse);
    rpc CapturePayment(CapturePaymentRequest) returns (PaymentIntentsResponse);
    rpc GetPaymentIntent(GetPaymentIntentRequest) returns (PaymentIntentsResponse);
    rpc VerifyRazorpayPayment(VerifyRazorpayPaymentRequest) returns (VerifyRazorpayPaymentResponse);

    // ProductImages (R2)
    rpc GetPresignedUploadUrl(GetPresignedUploadUrlRequest) returns (PresignedUploadUrlResponse);
    rpc ConfirmImageUpload(ConfirmImageUploadRequest) returns (ProductImagesResponse);

    // Coupons
    rpc ValidateCoupon(ValidateCouponRequest) returns (CouponsResponse);
    rpc ApplyCoupon(ApplyCouponRequest) returns (CouponsResponse);
    rpc CreateCoupon(CreateCouponRequest) returns (CouponsAdminResponse);
    rpc UpdateCoupon(UpdateCouponRequest) returns (CouponsAdminResponse);

    // Webhooks
    rpc IngestWebhook(IngestWebhookRequest) returns (WebhookEventsResponse);

    // OrderEvents
    rpc CreateOrderEvent(CreateOrderEventRequest) returns (OrderEventsResponse);
    rpc GetOrderEvents(GetOrderEventsRequest) returns (OrderEventsResponse);
    rpc SearchOrderEvents(SearchOrderEventsRequest) returns (OrderEventsResponse);

    // P1 Refunds
    rpc CreateRefund(CreateRefundRequest) returns (RefundsResponse);

    // P1 Manual NeedsReview resolution (admin)
    rpc ResolveNeedsReview(ResolveNeedsReviewRequest) returns (ResolveNeedsReviewResponse);

    // Shipments
    rpc CreateShipment(CreateShipmentRequest) returns (ShipmentsResponse);
    rpc UpdateShipment(UpdateShipmentRequest) returns (ShipmentsResponse);
    rpc GetShipment(GetShipmentRequest) returns (ShipmentsResponse);

    // Health / readiness (DB ping; for orchestrators)
    rpc Readiness(ReadinessRequest) returns (ReadinessResponse);
}
