
syntax = "proto3";

package grpc_services;

// Cart (variant-based: schema Cart uses VariantID)

message CreateCartItemRequest {
    optional int64 user_id = 1;
    int64 variant_id = 2;
    int64 quantity = 3;
    optional string session_id = 4;  // Guest cart when user_id not set
}

message GetCartItemsRequest {
    optional int64 user_id = 1;
    optional string session_id = 2;  // Guest cart; use when user_id not set
}

message UpdateCartItemRequest {
    int64 cart_id = 1;
    optional int64 user_id = 2;
    int64 variant_id = 3;
    int64 quantity = 4;
    optional string session_id = 5;
}

message DeleteCartItemRequest {
    optional int64 user_id = 1;
    optional int64 cart_id = 2;
    optional string session_id = 3;
}

message CartItemResponse {
    int64 cart_id = 1;
    int64 user_id = 2;
    int64 variant_id = 3;
    int64 quantity = 4;
}

message CartItemsResponse {
    repeated CartItemResponse items = 1;
}

// ShippingAddress (flattened: no country/state/city lookup; schema has UserID, Country, StateRegion, City, PostalCode, Road, ApartmentNoOrName)

message CreateShippingAddressRequest {
    optional int64 user_id = 1;
    string country = 2;
    string state_region = 3;
    string city = 4;
    string postal_code = 5;
    optional string road = 6;
    optional string apartment_no_or_name = 7;
}

message UpdateShippingAddressRequest {
    int64 shipping_address_id = 1;
    optional int64 user_id = 2;
    string country = 3;
    string state_region = 4;
    string city = 5;
    string postal_code = 6;
    optional string road = 7;
    optional string apartment_no_or_name = 8;
}

message DeleteShippingAddressRequest {
    int64 shipping_address_id = 1;
}

message GetShippingAddressRequest { }

message ShippingAddressResponse {
    int64 shipping_address_id = 1;
    optional int64 user_id = 2;
    string country = 3;
    string state_region = 4;
    string city = 5;
    string postal_code = 6;
    optional string road = 7;
    optional string apartment_no_or_name = 8;
}

message ShippingAddressesResponse {
    repeated ShippingAddressResponse items = 1;
}

// Products (schema: no StockQuantity; CategoryID required; inventory per variant)

message CreateProductRequest {
    string name = 1;
    optional string description = 2;
    int64 price_paise = 3;  // Price in minor units (e.g. 49900 = ₹499.00)
    int64 category_id = 4;   // Required; schema ProductCategories
}

message SearchProductRequest {
    optional string name = 1;
    optional string description = 2;
    optional int64 starting_price_paise = 3;
    optional int64 category_id = 4;
    optional int64 ending_price_paise = 5;
    optional int64 product_id = 6;
    optional int64 limit = 7;
    optional int64 offset = 8;
}

message GetProductsByIdRequest {
    repeated int64 product_ids = 1;
}

message UpdateProductRequest {
    string name = 1;
    optional string description = 2;
    int64 price_paise = 3;
    int64 category_id = 4;
    int64 product_id = 5;
}

message DeleteProductRequest {
    int64 product_id = 1;
}

message ProductResponse {
    string name = 1;
    optional string description = 2;
    int64 price_paise = 3;
    int64 category_id = 4;
    int64 product_id = 5;
}

message ProductsResponse {
    repeated ProductResponse items = 1;
}

// Users
// auth_provider = "email" → password_plain required, google_sub omitted
// auth_provider = "google" → google_sub required, password_plain omitted

message CreateUserRequest {
    string username = 1;
    string email = 2;
    string auth_provider = 3;            // "email" | "google"
    optional string password_plain = 4;  // Required when auth_provider="email"; server hashes; never returned
    optional string google_sub = 5;      // Required when auth_provider="google"; stable Google sub claim
    optional string full_name = 6;
    optional string address = 7;
    optional string phone = 8;
    optional int64 role_id = 9;
}

message SearchUserRequest {
    int64 user_id = 1;
}

message UpdateUserRequest {
    int64 user_id = 1;
    optional string username = 2;
    optional string email = 3;
    optional string password_plain = 4;  // If set, updates password_hash (email accounts only)
    optional string google_sub = 5;      // If set, updates google_sub (google accounts only)
    optional string full_name = 6;
    optional string address = 7;
    optional string phone = 8;
    optional int64 role_id = 9;
}

message DeleteUserRequest {
    int64 user_id = 1;
}

message UserResponse {
    int64 user_id = 1;
    string username = 2;
    string email = 3;
    string auth_provider = 4;            // "email" | "google"
    optional string full_name = 5;
    optional string address = 6;
    optional string phone = 7;
    string create_date = 8;
    optional string session_id = 9;      // Set on create_user when Redis session is created
}

message UsersResponse {
    repeated UserResponse items = 1;
}

// P2 Security: audit log for secrets rotation etc.
message RecordSecurityAuditRequest {
    string event_type = 1;  // e.g. secrets_rotation, config_reload
    optional string details = 2;
}
message RecordSecurityAuditResponse {
    bool success = 1;
}

// P2 Data retention: export PII for the user (no password); caller must be self or admin.
message GetUserPiiExportRequest {
    int64 user_id = 1;
}
message GetUserPiiExportResponse {
    int64 user_id = 1;
    string email = 2;
    optional string full_name = 3;
    optional string address = 4;
    optional string phone = 5;
    string create_date = 6;
}

// Categories

message CreateCategoryRequest {
    string name = 1;
}

message SearchCategoryRequest {
    optional int64 category_id = 1;
    optional string name = 2;
}

message UpdateCategoryRequest {
    int64 category_id = 1;
    string name = 2;
}

message DeleteCategoryRequest {
    int64 category_id = 1;
}

message CategoryResponse {
    int64 category_id = 1;
    string name = 2;
}

message CategoriesResponse {
    repeated CategoryResponse items = 1;
}

// Orders

message PlaceOrderRequest{
    int64 shipping_address_id = 1;
    int64 user_id = 2;
    optional string coupon_code = 3;
}
message CreateOrderRequest {
    int64 user_id = 1;
    int64 shipping_address_id = 2;
    int64 status_id = 3;
    int64 total_amount_paise = 4;  // Legacy total in paise; prefer grand_total_minor when set
    optional int64 subtotal_minor = 5;
    optional int64 shipping_minor = 6;
    optional int64 tax_total_minor = 7;
    optional int64 discount_total_minor = 8;
    optional int64 grand_total_minor = 9;
    optional int64 applied_coupon_id = 10;
    optional string applied_coupon_code = 11;
    optional int32 applied_discount_paise = 12;
}

message SearchOrderRequest {
    optional int64 order_id = 1;
    optional int64 user_id = 2;  // when unset, admin search (all orders)
    optional int64 order_date_start = 3;
    optional int64 order_date_end = 4;
    optional int64 status_id = 5;
    optional int64 limit = 6;
    optional int64 offset = 7;
}

message UpdateOrderRequest {
    int64 order_id = 1;
    int64 user_id = 2;
    int64 shipping_address_id = 3;
    int64 total_amount_paise = 4;
    int64 status_id = 5;
}

message DeleteOrderRequest {
    int64 order_id = 1;
}

// P1 Admin: mark order shipped/delivered with enforced transitions
message AdminMarkOrderShippedRequest {
    int64 order_id = 1;
    optional string awb_code = 2;
    optional string carrier = 3;
}
message AdminMarkOrderShippedResponse {
    int64 order_id = 1;
    int64 shipment_id = 2;  // 0 if none created
}

message AdminMarkOrderDeliveredRequest {
    int64 order_id = 1;
}
message AdminMarkOrderDeliveredResponse {
    int64 order_id = 1;
}

message OrderResponse {
    int64 order_id = 1;
    int64 user_id = 2;
    string order_date = 3;
    int64 shipping_address_id = 4;
    int64 total_amount_paise = 5;
    int64 status_id = 6;
}

message OrdersResponse {
    repeated OrderResponse items = 1;
}

// OrderStatus (list for admin dropdowns; table OrderStatus)
message SearchOrderStatusRequest {}
message OrderStatusResponse {
    int64 status_id = 1;
    string status_name = 2;
}
message OrderStatusesResponse {
    repeated OrderStatusResponse items = 1;
}

// OrderDetails (schema: VariantID not ProductID)

message CreateOrderDetailRequest {
    int64 order_id = 1;
    int64 variant_id = 2;
    int64 quantity = 3;
    int64 price_paise = 4;
    optional int32 unit_price_minor = 5;
    optional int32 discount_minor = 6;
    optional int32 tax_minor = 7;
    optional string sku = 8;
    optional string title = 9;
}

message CreateOrderDetailsRequest {
    repeated CreateOrderDetailRequest order_details = 1;
}

message SearchOrderDetailRequest {
    optional int64 order_detail_id = 1;
    optional int64 order_id = 2;
    optional int64 variant_id = 3;
    optional int64 quantity = 4;
    optional int64 price_start_paise = 5;
    optional int64 price_end_paise = 6;
}

message UpdateOrderDetailRequest {
    int64 order_detail_id = 1;
    int64 order_id = 2;
    int64 variant_id = 3;
    int64 quantity = 4;
    int64 price_paise = 5;
}

message OrderDetailResponse {
    int64 order_detail_id = 1;
    int64 order_id = 2;
    int64 variant_id = 3;
    int64 quantity = 4;
    int64 price_paise = 5;
}

message OrderDetailsResponse {
    repeated OrderDetailResponse items = 1;
}

// Reviews (schema: Rating TINYINT 1-5, UNIQUE(UserID, ProductID))

message CreateReviewRequest {
    int64 product_id = 1;
    int64 user_id = 2;
    int32 rating = 3;  // 1-5
    string comment = 4;
}

message SearchReviewRequest {
    int64 review_id = 1;
    optional int64 product_id = 2;
    optional int64 user_id = 3;
    optional int64 limit = 4;
    optional int64 offset = 5;
    optional string status_filter = 6;  // P2: "approved" | "pending" | "rejected" (default: all)
}

message UpdateReviewRequest {
    int64 review_id = 1;
    optional int64 product_id = 2;
    optional int64 user_id = 3;
    optional int32 rating = 4;  // 1-5
    optional string comment = 5;
}

message DeleteReviewRequest {
    int64 review_id = 1;
}

message ReviewResponse {
    int64 review_id = 1;
    int64 product_id = 2;
    int64 user_id = 3;
    int32 rating = 4;  // 1-5
    string comment = 5;
}

message ReviewsResponse {
    repeated ReviewResponse items = 1;
}

// P2 Review moderation: admin approve/reject
message AdminUpdateReviewStatusRequest {
    int64 review_id = 1;
    string status = 2;  // "approved" | "rejected"
}
message AdminUpdateReviewStatusResponse {
    bool success = 1;
}

// P2 Abandoned cart: scheduler enqueues events (call periodically, e.g. every hour)
message EnqueueAbandonedCartRequest {
    optional int64 delay_hours = 1;  // carts older than this (default 24)
}
message EnqueueAbandonedCartResponse {
    int32 enqueued_count = 1;
}

// P2 Recommendations: manual related products
message GetRelatedProductsRequest {
    int64 product_id = 1;
    optional int64 limit = 2;
}

// P2 SEO: sitemap entries (slug + lastmod for products)
message GetSitemapProductUrlsRequest {
    optional int64 limit = 1;  // max entries (default 5000)
}
message SitemapEntry {
    string slug = 1;       // product slug for URL path
    string lastmod = 2;    // RFC3339 date
}
message GetSitemapProductUrlsResponse {
    repeated SitemapEntry entries = 1;
}

// ProductImages

message SearchProductImageRequest {
    optional int64 image_id = 1;
    optional int64 product_id = 2;
    optional string alt_text = 3;
}

message UpdateProductImageRequest {
    int64 image_id = 1;
    int64 product_id = 2;
    string image_base64 = 3;
    optional string alt_text = 4;
}

message DeleteProductImageRequest {
    int64 image_id = 1;
}

message ProductImageResponse {
    int64 image_id = 1;
    int64 product_id = 2;
    string image_base64 = 3;    // legacy; empty for R2-backed images
    optional string alt_text = 4;
    optional string url = 5;    // full CDN URL
    optional string cdn_path = 6;
    optional string thumbnail_url = 7;
}

message ProductImagesResponse {
    repeated ProductImageResponse items = 1;
}

message GetPresignedUploadUrlRequest {
    int64 product_id = 1;
    string filename = 2;
    string content_type = 3;
}

message PresignedUploadUrlResponse {
    string upload_url = 1;  // PUT this URL directly from the client
    string key = 2;         // R2 object key — pass back to ConfirmImageUpload
    string cdn_url = 3;     // final public URL after upload
}

message ConfirmImageUploadRequest {
    int64 product_id = 1;
    string key = 2;
    optional string alt_text = 3;
    optional int32 display_order = 4;
}

// Inventory (schema: VariantID; no supplier)

message CreateInventoryItemRequest {
    int64 variant_id = 1;
    int64 quantity_available = 2;
    int64 reorder_level = 3;
}

message SearchInventoryItemRequest {
    optional int64 inventory_id = 1;
    optional int64 variant_id = 2;
}

message UpdateInventoryItemRequest {
    int64 inventory_id = 1;
    optional int64 variant_id = 2;
    optional int64 quantity_available = 3;
    optional int64 reorder_level = 4;
}

message DeleteInventoryItemRequest {
    int64 inventory_id = 1;
}

message InventoryItemResponse {
    int64 inventory_id = 1;
    int64 variant_id = 2;
    int64 quantity_available = 3;
    int64 reorder_level = 4;
}

message InventoryItemsResponse {
    repeated InventoryItemResponse items = 1;
}

// Wishlist

message AddWishlistItemRequest {
    int64 user_id = 1;
    int64 product_id = 2;
}

message SearchWishlistItemRequest {
    optional int64 wishlist_id = 1;
    int64 user_id = 2;
    optional int64 product_id = 3;

}

message DeleteWishlistItemRequest {
    int64 wishlist_id = 1;
    int64 user_id = 2;
}

message WishlistItemResponse {
    int64 wishlist_id = 1;
    int64 user_id = 2;
    int64 product_id = 3;
    string date_added = 4;
}

message WishlistItemsResponse {
    repeated WishlistItemResponse items = 1;
}

// ProductAttributes (schema: lookup only; UNIQUE(AttributeName, AttributeValue); link products via ProductAttributeMapping)

message CreateProductAttributeRequest {
    string attribute_name = 1;
    string attribute_value = 2;
}

message SearchProductAttributeRequest {
    optional int64 attribute_id = 1;
    optional string attribute_name = 2;
    optional string attribute_value = 3;
}

message UpdateProductAttributeRequest {
    int64 attribute_id = 1;
    optional string attribute_name = 2;
    optional string attribute_value = 3;
}

message DeleteProductAttributeRequest {
    int64 attribute_id = 1;
}

message ProductAttributeResponse {
    int64 attribute_id = 1;
    string attribute_name = 2;
    string attribute_value = 3;
}

message ProductAttributesResponse {
    repeated ProductAttributeResponse items = 1;
}

// ShippingMethods

message CreateShippingMethodRequest {
    string method_name = 1;
    int64 cost_paise = 2;
    string estimated_delivery_time = 3;
}

message SearchShippingMethodRequest {
    int64 method_id = 1;
}

message UpdateShippingMethodRequest {
    int64 method_id = 1;
    optional string method_name = 2;
    optional int64 cost_paise = 3;
    optional string estimated_delivery_time = 4;
}

message DeleteShippingMethodRequest {
    int64 method_id = 1;
}

message ShippingMethodResponse {
    int64 method_id = 1;
    string method_name = 2;
    int64 cost_paise = 3;
    string estimated_delivery_time = 4;
}

message ShippingMethodsResponse {
    repeated ShippingMethodResponse items = 1;
}

// UserRoles

message CreateUserRoleRequest {
    string role_name = 1;
}

message SearchUserRoleRequest {
    int64 role_id = 1;
}

message UpdateUserRoleRequest {
    int64 role_id = 1;
    string role_name = 2;
}

message DeleteUserRoleRequest {
    int64 role_id = 1;
}

message UserRoleResponse {
    int64 role_id = 1;
    string role_name = 2;
}

message UserRolesResponse {
    repeated UserRoleResponse items = 1;
}

// Transactions

message CreateTransactionRequest {
    int64 user_id = 1;
    int64 amount_paise = 2;
    string type = 3;
}

message SearchTransactionRequest {
    int64 transaction_id = 1;
}

message UpdateTransactionRequest {
    int64 transaction_id = 1;
    optional int64 user_id = 2;
    optional int64 amount_paise = 3;
    optional string type = 4;
}

message DeleteTransactionRequest {
    int64 transaction_id = 1;
}

message TransactionResponse {
    int64 transaction_id = 1;
    int64 user_id = 2;
    int64 amount_paise = 3;
    string transaction_date = 4;
    string type = 5;
}

message TransactionsResponse {
    repeated TransactionResponse items = 1;
}

// NewsletterSubscribers

message CreateNewsletterSubscriberRequest {
    string email = 1;
}

message SearchNewsletterSubscriberRequest {
    int64 subscriber_id = 1;
}

message UpdateNewsletterSubscriberRequest {
    int64 subscriber_id = 1;
    string email = 2;
}

message DeleteNewsletterSubscriberRequest {
    int64 subscriber_id = 1;
}

message NewsletterSubscriberResponse {
    int64 subscriber_id = 1;
    string email = 2;
    string subscription_date = 3;
}

message NewsletterSubscribersResponse {
    repeated NewsletterSubscriberResponse items = 1;
}

// Sizes

message CreateSizeRequest {
    string size_name = 1;
}

message SearchSizeRequest {
    int64 size_id = 1;
}

message UpdateSizeRequest {
    int64 size_id = 1;
    string size_name = 2;
}

message DeleteSizeRequest {
    int64 size_id = 1;
}

message SizeResponse {
    int64 size_id = 1;
    string size_name = 2;
}

message SizesResponse {
    repeated SizeResponse items = 1;
}

// Colors

message CreateColorRequest {
    string color_name = 1;
}

message SearchColorRequest {
    int64 color_id = 1;
}

message UpdateColorRequest {
    int64 color_id = 1;
    string color_name = 2;
}

message DeleteColorRequest {
    int64 color_id = 1;
}

message ColorResponse {
    int64 color_id = 1;
    string color_name = 2;
}

message ColorsResponse {
    repeated ColorResponse items = 1;
}

// ProductAttributeMapping (schema: many-to-many Products <-> ProductAttributes)

message CreateProductAttributeMappingRequest {
    int64 product_id = 1;
    int64 attribute_id = 2;
}

message SearchProductAttributeMappingRequest {
    int64 product_id = 1;
    int64 attribute_id = 2;
}

message DeleteProductAttributeMappingRequest {
    int64 product_id = 1;
    int64 attribute_id = 2;
}

message ProductAttributeMappingResponse {
    int64 product_id = 1;
    int64 attribute_id = 2;
}

message ProductAttributeMappingsResponse {
    repeated ProductAttributeMappingResponse items = 1;
}

// ProductVariants

message CreateProductVariantRequest {
    int64 product_id = 1;
    optional int64 size_id = 2;
    optional int64 color_id = 3;
    optional int64 additional_price_paise = 4;
}

message SearchProductVariantRequest {
    int64 variant_id = 1;
}

message UpdateProductVariantRequest {
    int64 variant_id = 1;
    optional int64 product_id = 2;
    optional int64 size_id = 3;
    optional int64 color_id = 4;
    optional int64 additional_price_paise = 5;
}

message DeleteProductVariantRequest {
    int64 variant_id = 1;
}

message ProductVariantResponse {
    int64 variant_id = 1;
    int64 product_id = 2;
    optional int64 size_id = 3;
    optional int64 color_id = 4;
    optional int64 additional_price_paise = 5;
}

message ProductVariantsResponse {
    repeated ProductVariantResponse items = 1;
}

// EventLogs

message CreateEventLogRequest {
    string event_type = 1;
    string event_description = 2;
    int64 user_id = 3;
}

message SearchEventLogRequest {
    int64 log_id = 1;
}

message UpdateEventLogRequest {
    int64 log_id = 1;
    optional string event_type = 2;
    optional string event_description = 3;
    optional int64 user_id = 4;
}

message DeleteEventLogRequest {
    int64 log_id = 1;
}

message EventLogResponse {
    int64 log_id = 1;
    string event_type = 2;
    string event_description = 3;
    int64 user_id = 4;
    string event_time = 5;
}

message EventLogsResponse {
    repeated EventLogResponse items = 1;
}

// UserActivity

message CreateUserActivityRequest {
    int64 user_id = 1;
    string activity_type = 2;
    string activity_details = 3;
}

message SearchUserActivityRequest {
    int64 activity_id = 1;
}

message UpdateUserActivityRequest {
    int64 activity_id = 1;
    optional int64 user_id = 2;
    optional string activity_type = 3;
    optional string activity_details = 4;
}

message DeleteUserActivityRequest {
    int64 activity_id = 1;
}

message UserActivityResponse {
    int64 activity_id = 1;
    int64 user_id = 2;
    string activity_type = 3;
    string activity_time = 4;
    string activity_details = 5;
}

message UserActivitiesResponse {
    repeated UserActivityResponse items = 1;
}

// InventoryLog (schema: VariantID)

message CreateInventoryLogRequest {
    int64 variant_id = 1;
    int64 change_quantity = 2;
    string reason = 3;
    optional string actor_id = 4;       // P1 admin audit: who changed
    optional int64 quantity_before = 5; // P1 admin audit
    optional int64 quantity_after = 6;  // P1 admin audit
}

message SearchInventoryLogRequest {
    optional int64 log_id = 1;
    optional int64 variant_id = 2;
}

message UpdateInventoryLogRequest {
    int64 log_id = 1;
    optional int64 variant_id = 2;
    optional int64 change_quantity = 3;
    optional string reason = 4;
}

message DeleteInventoryLogRequest {
    int64 log_id = 1;
}

message InventoryLogResponse {
    int64 log_id = 1;
    int64 variant_id = 2;
    int64 change_quantity = 3;
    string log_time = 4;
    string reason = 5;
}

message InventoryLogsResponse {
    repeated InventoryLogResponse items = 1;
}

// Coupons

message ValidateCouponRequest {
    string code = 1;
    int64 order_amount_paise = 2;
}

message ApplyCouponRequest {
    string code = 1;
    int64 order_amount_paise = 2;
}

message CouponResponse {
    int64 coupon_id = 1;
    string code = 2;
    string discount_type = 3;   // percentage | fixed_amount
    int32 discount_value = 4;
    int64 discount_amount_paise = 5;
    int64 final_amount_paise = 6;
    bool is_valid = 7;
    string reason = 8;
}

message CouponsResponse {
    repeated CouponResponse items = 1;
}

// P1 Admin coupon management
message CreateCouponRequest {
    string code = 1;
    string discount_type = 2;   // percentage | fixed_amount
    int32 discount_value = 3;
    optional int32 min_order_value_paise = 4;
    optional int32 usage_limit = 5;
    optional int32 max_uses_per_customer = 6;
    string starts_at = 7;      // RFC3339
    optional string ends_at = 8;
}
message UpdateCouponRequest {
    int64 coupon_id = 1;
    optional string status = 2;   // active | inactive
    optional int32 usage_limit = 3;
    optional string ends_at = 4;  // RFC3339
}
message CouponAdminResponse {
    int64 coupon_id = 1;
    string code = 2;
    string discount_type = 3;
    int32 discount_value = 4;
    optional int32 min_order_value_paise = 5;
    optional int32 usage_limit = 6;
    optional int32 usage_count = 7;
    optional int32 max_uses_per_customer = 8;
    string status = 9;
    string starts_at = 10;
    optional string ends_at = 11;
}
message CouponsAdminResponse {
    repeated CouponAdminResponse items = 1;
}

// Shipments

message CreateShipmentRequest {
    int64 order_id = 1;
    optional string shiprocket_order_id = 2;
    optional string awb_code = 3;
    optional string carrier = 4;
}

message UpdateShipmentRequest {
    int64 shipment_id = 1;
    optional string shiprocket_order_id = 2;
    optional string awb_code = 3;
    optional string carrier = 4;
    optional string status = 5;  // pending | processed | failed
}

message GetShipmentRequest {
    optional int64 shipment_id = 1;
    optional int64 order_id = 2;
}

message ShipmentResponse {
    int64 shipment_id = 1;
    int64 order_id = 2;
    optional string shiprocket_order_id = 3;
    optional string awb_code = 4;
    optional string carrier = 5;
    string status = 6;
    string created_at = 7;
    optional string delivered_at = 8;
}

message ShipmentsResponse {
    repeated ShipmentResponse items = 1;
}

// PaymentIntents

message CreatePaymentIntentRequest {
    int64 order_id = 1;
    int64 user_id = 2;
    int64 amount_paise = 3;
    optional string currency = 4;  // defaults to "INR"
    optional string razorpay_order_id = 5;  // When absent, backend creates Razorpay order via API
}

message CapturePaymentRequest {
    int64 intent_id = 1;
    string razorpay_payment_id = 2;  // Payment ID returned by Razorpay after payment
}

message GetPaymentIntentRequest {
    optional int64 intent_id = 1;
    optional int64 order_id = 2;
}

message PaymentIntentResponse {
    int64 intent_id = 1;
    string razorpay_order_id = 2;
    optional int64 order_id = 3;
    optional int64 user_id = 4;
    int64 amount_paise = 5;
    optional string currency = 6;
    string status = 7;
    optional string razorpay_payment_id = 8;
    string created_at = 9;
    string expires_at = 10;
    optional string razorpay_key_id = 11;  // For frontend Checkout (key_id only, never secret)
}

message PaymentIntentsResponse {
    repeated PaymentIntentResponse items = 1;
}

// Verify client-returned Razorpay signature after checkout (mark ClientVerified; webhook is final authority for Paid).
message VerifyRazorpayPaymentRequest {
    int64 order_id = 1;
    string razorpay_payment_id = 2;
    string razorpay_order_id = 3;
    string razorpay_signature = 4;
}

message VerifyRazorpayPaymentResponse {
    bool verified = 1;
    optional PaymentIntentResponse payment_intent = 2;
}

// Webhooks

message IngestWebhookRequest {
    string provider = 1;
    string event_type = 2;
    string webhook_id = 3;      // idempotency key (e.g. provider:payment_id)
    string payload_json = 4;    // raw JSON payload string
    bool signature_verified = 5;
    optional string provider_event_id = 6;  // e.g. x-razorpay-event-id for replay protection
}

message WebhookEventResponse {
    int64 event_id = 1;
    string provider = 2;
    string event_type = 3;
    string webhook_id = 4;
    string status = 5;
    string received_at = 6;
}

message WebhookEventsResponse {
    repeated WebhookEventResponse items = 1;
}

// OrderEvents

message CreateOrderEventRequest {
    int64 order_id = 1;
    string event_type = 2;
    optional string from_status = 3;
    optional string to_status = 4;
    string actor_type = 5;  // customer | admin | system
    optional string message = 6;
}

message GetOrderEventsRequest {
    int64 order_id = 1;
}

// P1 Admin audit log viewer (optional order_id = all recent events)
message SearchOrderEventsRequest {
    optional int64 order_id = 1;
    optional int64 limit = 2;
    optional int64 offset = 3;
}

message OrderEventResponse {
    int64 event_id = 1;
    int64 order_id = 2;
    string event_type = 3;
    string from_status = 4;
    string to_status = 5;
    string actor_type = 6;
    string message = 7;
    string created_at = 8;
}

message OrderEventsResponse {
    repeated OrderEventResponse items = 1;
}

// P1 Refunds (idempotent by gateway_refund_id; line-item aware optional)
message CreateRefundRequest {
    int64 order_id = 1;
    string gateway_refund_id = 2;  // Unique per refund; idempotency key
    int64 amount_paise = 3;
    optional string currency = 4;  // defaults to INR
    optional string line_items_refunded_json = 5;  // JSON array of {order_detail_id, quantity_refunded, amount_paise}
}

message RefundResponse {
    int64 refund_id = 1;
    int64 order_id = 2;
    string gateway_refund_id = 3;
    int64 amount_paise = 4;
    string currency = 5;
    string status = 6;
    string created_at = 7;
}

message RefundsResponse {
    repeated RefundResponse items = 1;
}

// P1 Manual NeedsReview resolution (admin: mark as paid / cancelled / refunded)
message ResolveNeedsReviewRequest {
    int64 order_id = 1;
    string resolution = 2;  // "paid" | "cancelled" | "refunded"
    string actor_id = 3;    // admin identifier for audit (e.g. user_id or "admin")
}

message ResolveNeedsReviewResponse {
    bool success = 1;
    string message = 2;  // e.g. "Order marked as paid"
}

// Readiness (health) check — used by orchestrators to verify DB and optional deps.
message ReadinessRequest {}

message ReadinessResponse {
    bool ok = 1;
    optional string error = 2;  // set when ok is false
}
